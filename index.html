<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sephora Anniversary | Multicolored Goth Edition</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@0,900;1,900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sephora-dark-pink: #4a001a; 
            --dark-bg: #000000;
            --cyan: #00f5ff;
            --white-cold: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: var(--dark-bg);
            color: var(--white-cold);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            perspective: 1500px;
        }

        #webgl-container {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle at center, #1a0008 0%, #000 100%);
        }

        #scene {
            position: absolute; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
        }

        .card-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d;
        }

        .glass-premium {
            width: 260px; height: 260px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 1);
            z-index: 5;
        }

        .s-logo {
            font-size: 160px; font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, var(--sephora-dark-pink) 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hand {
            position: absolute; width: 450px;
            z-index: 20; opacity: 0;
            fill: #080808; stroke: rgba(255, 255, 255, 0.02);
            pointer-events: none;
        }
        .hand-left { left: 0; transform: translateX(-100%); }
        .hand-right { right: 0; transform: translateX(100%) scaleX(-1); }

        .glitch-btn {
            position: absolute; bottom: 10vh;
            padding: 20px 60px;
            background: transparent;
            border: 1px solid var(--sephora-dark-pink);
            color: var(--white-cold);
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            letter-spacing: 6px;
            cursor: pointer; z-index: 100;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }
        .glitch-btn:hover {
            background: var(--sephora-dark-pink);
            box-shadow: 0 0 50px rgba(74, 0, 26, 0.5);
        }

        /* --- PAGE FINALE AVEC FANTÔMES --- */
        .final-page {
            position: fixed; inset: 0;
            background: black;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; z-index: 200;
            overflow: hidden;
        }

        .mega-name {
            font-family: 'Playfair Display', serif;
            font-size: 15vw; /* S'adapte à la largeur de l'écran */
            font-weight: 900;
            font-style: italic;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 0.9;
            text-align: center;
            width: 100%;
            max-width: 100vw;
            display: block;
            word-wrap: break-word; /* Force le texte à rester dans le cadre */
        }

        /* Style des têtes de fantômes colorés */
        .ghost {
            position: absolute;
            bottom: -150px;
            width: 80px;
            height: 100px;
            opacity: 0.6; /* Transparence pour voir le texte */
            pointer-events: none;
            filter: blur(1px) drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
            z-index: 5;
        }
    </style>
</head>

<body>

    <div id="webgl-container"></div>

    <button id="startBtn" class="glitch-btn">DÉBLOQUER L'EXPÉRIENCE</button>

    <div id="scene">
        <div class="card-wrapper">
            <svg class="hand hand-left" viewBox="0 0 200 200">
                <path d="M10,100 Q40,80 80,100 T150,110 L150,140 Q100,150 50,140 Z" />
                <rect x="140" y="90" width="40" height="20" rx="10" />
                <rect x="140" y="120" width="40" height="20" rx="10" />
            </svg>
            <div class="glass-premium"><div class="s-logo">S</div></div>
            <svg class="hand hand-right" viewBox="0 0 200 200">
                <path d="M10,100 Q40,80 80,100 T150,110 L150,140 Q100,150 50,140 Z" />
                <rect x="140" y="90" width="40" height="20" rx="10" />
                <rect x="140" y="120" width="40" height="20" rx="10" />
            </svg>
        </div>
    </div>

    <div class="final-page" id="finalPage">
        <h3 style="letter-spacing: 15px; color: var(--cyan); font-size: 12px; margin-bottom: 20px; z-index:10;">L'ANNIVERSAIRE OBSCUR</h3>
        <h2 class="mega-name">SEPHORA</h2>
        <p style="font-size: 1.8rem; margin-top: 40px; font-weight: 100; font-family: 'Playfair Display'; font-style: italic; z-index:10;">Joyeux Anniversaire...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const anthem = new Audio('Sephora_s_Anthem.mp3');
        anthem.preload = 'auto';

        // --- 1. FONCTION GÉNÉRATRICE DE FANTÔMES MULTICOLORES ---
        function createGhosts() {
            const finalPage = document.getElementById('finalPage');
            const ghostColors = ['#ff0055', '#00f5ff', '#8a2be2', '#ff8c00']; // Palette de couleurs vives

            for (let i = 0; i < 20; i++) {
                const ghost = document.createElement('div');
                ghost.className = 'ghost';
                const randomColorIndex = Math.floor(Math.random() * ghostColors.length);
                const randomColor = ghostColors[randomColorIndex];

                // SVG de tête de fantôme coloré
                ghost.innerHTML = `
                    <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 0C22.4 0 0 22.4 0 50V120L20 105L40 120L50 110L60 120L80 105L100 120V50C100 22.4 77.6 0 50 0Z" fill="${randomColor}"/>
                        <circle cx="30" cy="45" r="8" fill="black"/>
                        <circle cx="70" cy="45" r="8" fill="black"/>
                        <ellipse cx="50" cy="75" rx="10" ry="15" fill="black"/>
                    </svg>
                `;
                finalPage.appendChild(ghost);

                // Position et animation aléatoires
                const randomX = Math.random() * 100;
                const randomSize = 40 + Math.random() * 120; // Tailles variées
                const randomDelay = Math.random() * 5;
                const randomDuration = 10 + Math.random() * 15; // Vitesses variées

                ghost.style.left = randomX + '%';
                ghost.style.width = randomSize + 'px';

                // Animation infinie du bas vers le haut
                gsap.to(ghost, {
                    y: -window.innerHeight - 300,
                    duration: randomDuration,
                    delay: randomDelay,
                    repeat: -1,
                    ease: "none",
                    onRepeat: () => {
                        ghost.style.left = Math.random() * 100 + '%';
                    }
                });

                // Flottement latéral sineux
                gsap.to(ghost, {
                    x: 60,
                    duration: 2.5 + Math.random() * 2.5,
                    repeat: -1,
                    yoyo: true,
                    ease: "sine.inOut"
                });
            }
        }

        // --- 2. THREE.JS BACKGROUND ---
        const scene3d = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pts = new Float32Array(2000 * 3);
        for (let i = 0; i < 6000; i++) pts[i] = (Math.random() - 0.5) * 10;
        geo.setAttribute('position', new THREE.BufferAttribute(pts, 3));
        const mat = new THREE.PointsMaterial({ size: 0.015, color: '#444', transparent: true, opacity: 0.5 });
        const cloud = new THREE.Points(geo, mat);
        scene3d.add(cloud);
        camera.position.z = 5;

        function render() {
            requestAnimationFrame(render);
            cloud.rotation.y += 0.0005;
            renderer.render(scene3d, camera);
        }
        render();

        // --- 3. L'EXPÉRIENCE ---
        document.getElementById('startBtn').addEventListener('click', () => {
            anthem.play().catch(e => console.log("Audio play blocked", e));

            const tl = gsap.timeline();

            tl.to("#startBtn", { y: 50, opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById('startBtn').remove();
                createGhosts(); // Lancement des fantômes après le clic
            }});

            tl.to(".hand-left", { xPercent: 105, opacity: 1, duration: 1.2, ease: "elastic.out(1, 0.7)" }, 0.2)
                .to(".hand-right", { xPercent: -105, opacity: 1, duration: 1.2, ease: "elastic.out(1, 0.7)" }, 0.2);

            tl.to(".card-wrapper", {
                scale: 45,
                z: 2500,
                opacity: 0,
                duration: 2.2,
                ease: "power4.inOut"
            }, 1.5);

            tl.to("#finalPage", { autoAlpha: 1, duration: 1.2 }, 2.5);
            tl.from(".mega-name", { letterSpacing: "-30px", opacity: 0, duration: 2, ease: "expo.out" }, 2.8);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
