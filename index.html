<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sephora Anniversary | Multicolored Goth Edition</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@0,900;1,900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sephora-dark-pink: #4a001a; 
            --dark-bg: #000000;
            --cyan: #00f5ff;
            --white-cold: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--dark-bg);
            color: var(--white-cold);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            perspective: 1500px;
        }

        #webgl-container {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle at center, #1a0008 0%, #000 100%);
        }

        #scene {
            position: absolute; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
            width: 100%;
        }

        .card-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d;
        }

        .glass-premium {
            width: 260px; height: 260px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 1);
            z-index: 5;
            transition: all 0.3s ease;
        }

        .s-logo {
            font-size: 160px; font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, var(--sephora-dark-pink) 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glitch-btn {
            position: absolute; bottom: 10vh;
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--sephora-dark-pink);
            color: var(--white-cold);
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            letter-spacing: 4px;
            cursor: pointer; z-index: 100;
            text-transform: uppercase;
            transition: all 0.4s ease;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .glass-premium {
                width: 180px; height: 180px;
                border-radius: 30px;
            }
            .s-logo { font-size: 100px; }
            .glitch-btn { padding: 12px 25px; letter-spacing: 2px; font-size: 0.7rem; }
            .mega-name { font-size: 22vw !important; }
            .final-page p { font-size: 1.2rem !important; }
        }

        .final-page {
            position: fixed; inset: 0;
            background: black;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; z-index: 200;
            overflow: hidden;
            padding: 20px;
            text-align: center;
        }

        .mega-name {
            font-family: 'Playfair Display', serif;
            font-size: 15vw;
            font-weight: 900;
            font-style: italic;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 0.9;
            width: 100%;
            display: block;
        }

        .ghost {
            position: absolute;
            bottom: -150px;
            width: 60px;
            height: 80px;
            opacity: 0.6;
            pointer-events: none;
            filter: blur(1px) drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
            z-index: 5;
        }
    </style>
</head>

<body>
    <div id="webgl-container"></div>
    <button id="startBtn" class="glitch-btn">DÉBLOQUER L'EXPÉRIENCE</button>

    <div id="scene">
        <div class="card-wrapper">
            <div class="glass-premium"><div class="s-logo">S</div></div>
        </div>
    </div>

    <div class="final-page" id="finalPage">
        <h3 class="sub-title" style="letter-spacing: 5px; color: var(--cyan); font-size: 10px; margin-bottom: 20px; z-index:10;">L'ANNIVERSAIRE OBSCUR</h3>
        <h2 class="mega-name">SEPHORA</h2>
        <p style="font-size: 1.8rem; margin-top: 40px; font-weight: 100; font-family: 'Playfair Display'; font-style: italic; z-index:10;">Joyeux Anniversaire...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const anthem = new Audio('Sephora_s_Anthem.mp3');
        anthem.preload = 'auto';

        function createGhosts() {
            const finalPage = document.getElementById('finalPage');
            const ghostColors = ['#ff0055', '#00f5ff', '#8a2be2', '#ff8c00'];

            for (let i = 0; i < 15; i++) {
                const ghost = document.createElement('div');
                ghost.className = 'ghost';
                const randomColor = ghostColors[Math.floor(Math.random() * ghostColors.length)];

                ghost.innerHTML = `
                    <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 0C22.4 0 0 22.4 0 50V120L20 105L40 120L50 110L60 120L80 105L100 120V50C100 22.4 77.6 0 50 0Z" fill="${randomColor}"/>
                        <circle cx="30" cy="45" r="8" fill="black"/>
                        <circle cx="70" cy="45" r="8" fill="black"/>
                        <ellipse cx="50" cy="75" rx="10" ry="15" fill="black"/>
                    </svg>
                `;
                finalPage.appendChild(ghost);

                const randomX = Math.random() * 90;
                const randomSize = 30 + Math.random() * 80;
                ghost.style.left = randomX + '%';
                ghost.style.width = randomSize + 'px';

                gsap.to(ghost, {
                    y: -window.innerHeight - 300,
                    duration: 8 + Math.random() * 10,
                    delay: Math.random() * 5,
                    repeat: -1,
                    ease: "none"
                });

                gsap.to(ghost, {
                    x: 40,
                    duration: 2 + Math.random() * 2,
                    repeat: -1,
                    yoyo: true,
                    ease: "sine.inOut"
                });
            }
        }

        const scene3d = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pts = new Float32Array(1500 * 3);
        for (let i = 0; i < 4500; i++) pts[i] = (Math.random() - 0.5) * 10;
        geo.setAttribute('position', new THREE.BufferAttribute(pts, 3));
        const mat = new THREE.PointsMaterial({ size: 0.02, color: '#444', transparent: true, opacity: 0.5 });
        const cloud = new THREE.Points(geo, mat);
        scene3d.add(cloud);
        camera.position.z = 5;

        function render() {
            requestAnimationFrame(render);
            cloud.rotation.y += 0.0007;
            renderer.render(scene3d, camera);
        }
        render();

        document.getElementById('startBtn').addEventListener('click', () => {
            anthem.play().catch(() => {});
            const tl = gsap.timeline();

            tl.to("#startBtn", { y: 30, opacity: 0, duration: 0.4, onComplete: () => {
                document.getElementById('startBtn').remove();
                createGhosts();
            }});

            tl.to(".card-wrapper", {
                scale: 50,
                z: 2000,
                opacity: 0,
                duration: 2,
                ease: "power4.in"
            }, 0.2);

            tl.to("#finalPage", { autoAlpha: 1, duration: 1 }, 1);
            tl.from(".mega-name", { letterSpacing: "-20px", opacity: 0, duration: 1.5, ease: "expo.out" }, 1.2);
        });

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });
    </script>
</body>
</html>
